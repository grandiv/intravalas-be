name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            echo "Starting deployment..."
            cd /home/AgentZcy/apps/intravalas-be

            echo "Pulling latest changes..."
            git pull origin main

            echo "Installing dependencies..."
            npm ci

            echo "Building application..."
            npm run build

            echo "Restarting PM2 process..."
            pm2 restart intravalas-be

            echo "Deployment complete!"
            pm2 list | grep intravalas-be

      - name: Health Check
        run: |
          sleep 10
          curl -f https://api.intravalas.izcy.tech/_health || exit 1
